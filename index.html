<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>💕 緣分測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#fdf0ec;--card:#fffaf8;--pink:#d4a5a0;--pink2:#e8c4be;--pink3:#f5e0db;--blush:#c9938c;--blush2:#b87070;--muted:#9a7570;--text:#5a3d38;--green:#8ab880;--shadow:rgba(212,165,160,0.18);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.bbg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.fb{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(0) translateX(0) scale(1);opacity:0;}10%{opacity:.55;}50%{transform:translateY(-45vh) translateX(var(--drift)) scale(1.05);}90%{opacity:.25;}100%{transform:translateY(-100vh) translateX(var(--drift)) scale(.7);opacity:0;}}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.header{text-align:center;margin-bottom:1.4rem;}
.pingu-wrap{position:relative;width:100px;height:100px;margin:0 auto .8rem;}
.pingu-svg{width:100px;height:100px;animation:wobble 3s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(212,165,160,.4));}
.speech{position:absolute;top:-14px;right:-30px;background:var(--card);border:2px solid var(--pink2);border-radius:14px 14px 14px 4px;padding:4px 10px;font-size:.72rem;font-weight:800;color:var(--blush);white-space:nowrap;box-shadow:0 3px 10px var(--shadow);}
@keyframes wobble{0%,100%{transform:rotate(-4deg) translateY(0)}25%{transform:rotate(4deg) translateY(-5px)}75%{transform:rotate(2deg) translateY(-7px)}}
.header h1{font-size:1.65rem;font-weight:800;color:var(--blush);line-height:1.25;margin-bottom:.35rem;}
.header p{font-size:.84rem;color:var(--muted);line-height:1.6;}
.loading{text-align:center;padding:3rem 1rem;}
.loading .spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--pink3);border-top-color:var(--blush);animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.9rem;color:var(--muted);font-weight:600;}
.err-card{background:var(--card);border:1.5px solid #e8c4be;border-radius:18px;padding:1.5rem;text-align:center;}
.err-card p{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;}
.btn-retry{padding:.8rem 1.8rem;border-radius:14px;border:2px solid var(--blush);background:transparent;color:var(--blush);font-size:.9rem;font-weight:800;cursor:pointer;}
.prog{margin-bottom:1.2rem;}
.prog-meta{display:flex;justify-content:space-between;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;}
.prog-bar{height:8px;background:var(--pink3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--blush));border-radius:99px;transition:width .3s ease;}
.intro{background:var(--card);border:1.5px solid var(--pink3);border-radius:22px;padding:1.1rem;box-shadow:0 4px 20px var(--shadow);margin-bottom:1rem;}
.intro-title{font-size:1rem;font-weight:800;color:var(--blush);margin-bottom:.7rem;text-align:center;}
.intro-grid{display:grid;grid-template-columns:1fr;gap:.6rem;margin-bottom:.9rem;}
.intro-card{background:linear-gradient(135deg,#fff6f4,#fff1ee);border:1.5px solid var(--pink3);border-radius:14px;padding:.75rem .85rem;}
.intro-card .k{font-size:.78rem;font-weight:800;color:var(--blush);margin-bottom:.2rem;}
.intro-card .d{font-size:.82rem;color:var(--muted);line-height:1.55;}
.qcard{background:var(--card);border:1.5px solid var(--pink3);border-radius:22px;padding:1.4rem 1.2rem 1.1rem;box-shadow:0 4px 20px var(--shadow);margin-bottom:1rem;}
.qnum{display:inline-block;background:var(--pink3);color:var(--blush);font-size:.68rem;font-weight:800;padding:2px 12px;border-radius:99px;margin-bottom:.6rem;}
.qsec{display:inline-block;background:linear-gradient(135deg,#f5e0db,#fff1ee);color:var(--blush);font-size:.72rem;font-weight:800;padding:5px 12px;border-radius:999px;margin-bottom:.65rem;border:1px solid #e8c4be;}
.qtxt{font-size:1rem;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:1rem;}
.opts{display:flex;flex-direction:column;gap:.5rem;}
.opt{display:flex;align-items:flex-start;gap:.75rem;padding:.8rem .95rem;border:2px solid var(--pink3);border-radius:14px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--muted);background:var(--bg);text-align:left;line-height:1.5;width:100%;transition:border-color .12s,background .12s,color .12s;touch-action:manipulation;}
.opt.sel{border-color:var(--blush);background:linear-gradient(135deg,#fff5f3,#fde8e4);color:var(--text);}
.rdot{width:18px;height:18px;flex-shrink:0;border-radius:50%;border:2.5px solid var(--pink2);margin-top:2px;display:flex;align-items:center;justify-content:center;}
.opt.sel .rdot{border-color:var(--blush);background:var(--blush);}
.opt.sel .rdot::after{content:'';width:6px;height:6px;border-radius:50%;background:white;}
.opt.multi .rdot{border-radius:6px;}
.opt.multi.sel .rdot::after{content:'✓';font-size:11px;font-weight:800;color:white;width:auto;height:auto;border-radius:0;background:transparent;}
.multi-hint{font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:.6rem;display:block;}
.tinp{width:100%;padding:.85rem 1rem;border:2px solid var(--pink3);border-radius:14px;background:var(--bg);font-size:1rem;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;text-align:center;}
.tinp:focus{border-color:var(--blush);background:var(--card);}
.nav{display:flex;gap:.65rem;}
.btn{flex:1;padding:.85rem;border-radius:14px;border:none;font-size:.95rem;font-weight:800;cursor:pointer;touch-action:manipulation;}
.bprev{background:var(--card);border:2px solid var(--pink3);color:var(--muted);}
.bnext{background:linear-gradient(135deg,var(--blush),var(--blush2));color:white;box-shadow:0 4px 16px rgba(201,147,140,.4);}
.bnext:disabled{opacity:.38;cursor:not-allowed;}
.start-cta{animation:ctaPulse 1.9s ease-in-out infinite;}
@keyframes ctaPulse{0%,100%{transform:translateY(0) scale(1);}45%{transform:translateY(-2px) scale(1.02);}70%{transform:translateY(0) scale(1);}}
.rcard,.nmcard{background:var(--card);border:1.5px solid var(--pink3);border-radius:24px;padding:2rem 1.5rem;text-align:center;box-shadow:0 6px 28px var(--shadow);}
.rcard{border:3px solid var(--blush);box-shadow:0 12px 40px rgba(201,147,140,.35),0 0 0 6px rgba(232,196,190,.35);position:relative;overflow:hidden;animation:resultPop .9s ease both;}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#e8c4be,#c9938c,#d4a5a0);}
@keyframes resultPop{from{transform:scale(.92);opacity:.2}to{transform:scale(1);opacity:1}}
.rbadge{font-size:.68rem;font-weight:800;letter-spacing:.14em;color:var(--blush);text-transform:uppercase;margin-bottom:.6rem;}
.rlabel{font-size:1rem;font-weight:700;color:var(--muted);margin-bottom:.3rem;}
.rname{font-size:2.35rem;font-weight:900;color:var(--blush);line-height:1.15;margin-bottom:.95rem;text-shadow:0 2px 0 #fff,0 8px 24px rgba(201,147,140,.35);}
.rprivate{display:inline-flex;align-items:center;gap:.4rem;background:var(--pink3);color:var(--blush);font-size:.82rem;font-weight:700;padding:.5rem 1.2rem;border-radius:99px;}
.nmcard h2{font-size:1.1rem;font-weight:800;color:var(--blush);margin-bottom:.5rem;}
.nmcard p{font-size:.86rem;color:var(--muted);line-height:1.7;}
.brst{width:100%;padding:.9rem;border-radius:14px;border:2px solid var(--blush);background:transparent;color:var(--blush);font-size:.95rem;font-weight:800;cursor:pointer;margin-top:1rem;}
.saving{text-align:center;font-size:.76rem;font-weight:700;color:var(--muted);margin-top:.6rem;min-height:1.1rem;}
.saving.ok{color:var(--green);}.saving.err{color:#c07070;}
</style>
</head>
<body>
<div class="bbg" id="bbg"></div>
<div class="wrap">
  <div class="header">
    <div class="pingu-wrap">
      <svg class="pingu-svg" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="96" rx="34" ry="40" fill="#1a1a1a"/><ellipse cx="60" cy="102" rx="22" ry="28" fill="#f5f0e8"/>
        <circle cx="60" cy="52" r="32" fill="#1a1a1a"/><ellipse cx="60" cy="56" rx="20" ry="18" fill="#f5f0e8"/>
        <circle cx="52" cy="48" r="9" fill="white"/><circle cx="52" cy="48" r="6" fill="#1a1a1a"/><circle cx="54" cy="46" r="2.5" fill="white"/>
        <circle cx="68" cy="48" r="9" fill="white"/><circle cx="68" cy="48" r="6" fill="#1a1a1a"/><circle cx="70" cy="46" r="2.5" fill="white"/>
        <ellipse cx="60" cy="63" rx="11" ry="9" fill="#d44444"/><ellipse cx="60" cy="60" rx="8" ry="5" fill="#e86666"/>
        <path d="M51 63 Q60 69 69 63" fill="none" stroke="#b03030" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="26" cy="100" rx="10" ry="22" fill="#1a1a1a" transform="rotate(-15 26 100)"/>
        <ellipse cx="94" cy="100" rx="10" ry="22" fill="#1a1a1a" transform="rotate(15 94 100)"/>
        <ellipse cx="48" cy="134" rx="12" ry="6" fill="#d4a030" transform="rotate(-10 48 134)"/>
        <ellipse cx="72" cy="134" rx="12" ry="6" fill="#d4a030" transform="rotate(10 72 134)"/>
        <rect x="36" y="77" width="48" height="10" rx="5" fill="#d4a5a0"/><rect x="36" y="79" width="48" height="6" rx="3" fill="#e8c4be"/>
        <ellipse cx="44" cy="59" rx="7" ry="4" fill="#e8a0a0" opacity=".35"/><ellipse cx="76" cy="59" rx="7" ry="4" fill="#e8a0a0" opacity=".35"/>
      </svg>
      <div class="speech">Noot Noot! 💕</div>
    </div>
    <h1>你的緣分在哪裡？</h1>
    <p>完成測驗，找出最適合你的對象 💕</p>
  </div>
  <div id="app"></div>
</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbx78PvtXHNZ36n7Y3jCx7wpsR6iTHwCFWfT4_nnmV0kv35T9ZvRSSTx29hNBRmqJAj_tg/exec';
const PRIORITY=['韓系小奶狗','潛力校草理工男','油頭精壯凹豆男'];

let QS=[],GUYS=[],qi=0;
const ans={};
let done=false,winner=null,started=false,pendingSectionIntro='';
const app=document.getElementById('app');

(function(){
  const bg=document.getElementById('bbg');
  if(!bg)return;
  const colors=['rgba(212,165,160,0.30)','rgba(232,196,190,0.28)','rgba(196,184,212,0.24)','rgba(242,219,215,0.35)'];
  for(let i=0;i<26;i++){
    const b=document.createElement('div');b.className='fb';
    const sz=10+Math.random()*30,dur=9+Math.random()*14,delay=Math.random()*12,drift=(Math.random()-.5)*90;
    b.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;bottom:-'+sz+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';--drift:'+drift+'px;animation-duration:'+dur+'s;animation-delay:'+delay+'s;border:1px solid rgba(255,255,255,.35);';
    bg.appendChild(b);
  }
})();

function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function normalize(v){return String(v==null?'':v).replace(/[\s\u3000]/g,'').toLowerCase();}
function showLoading(){app.innerHTML='<div class="loading"><div class="spin"></div><p>正在載入題目中…</p></div>';}
function showError(msg){app.innerHTML='<div class="err-card"><p>😟 '+esc(msg)+'</p><button class="btn-retry" onclick="boot()">重新載入</button></div>';}

function boot(){
  showLoading();
  const cb='_quiz_'+Date.now(),tag=document.createElement('script');
  let loaded=false;
  const timeout=setTimeout(function(){if(loaded)return;loaded=true;cleanup();showError('載入逾時');},10000);
  function cleanup(){try{delete window[cb];}catch(e){}try{document.head.removeChild(tag);}catch(e){}}
  window[cb]=function(data){
    if(loaded)return;loaded=true;clearTimeout(timeout);cleanup();
    if(!data||data.error){showError(data&&data.error?data.error:'讀取資料失敗');return;}
    GUYS=Array.isArray(data.guys)?data.guys:[];
    QS=Array.isArray(data.questions)?data.questions:[];
    if(!QS.length||QS.length<=2){showError('題目載入異常');return;}
    render();
  };
  tag.onerror=function(){if(loaded)return;loaded=true;clearTimeout(timeout);cleanup();showError('無法連到 Apps Script');};
  tag.src=SCRIPT_URL+'?callback='+cb+'&t='+Date.now();
  document.head.appendChild(tag);
}

function render(){
  if(!started&&!done){renderIntro();return;}
  if(pendingSectionIntro){renderSectionIntro(pendingSectionIntro);return;}
  if(done){renderResult();return;}
  renderQ();
}

function renderIntro(){
  app.innerHTML='<div class="intro"><div class="intro-title">開始前先看看題目分欄 ✨</div><div class="intro-grid"><div class="intro-card"><div class="k">關於我</div><div class="d">前半段會了解你的基本特質與習慣。</div></div><div class="intro-card"><div class="k">關於你喜歡的男生</div><div class="d">後半段會了解你對理想對象的偏好。</div></div></div><button class="btn bnext start-cta" id="startBtn" style="width:100%">開始作答</button></div>';
  document.getElementById('startBtn').onclick=function(){started=true;render();};
}

function renderSectionIntro(section){
  const msg=section==='關於你喜歡的男生'?'接下來會進入你對理想對象偏好的題目。':'接下來先了解你的個人特質與習慣。';
  app.innerHTML='<div class="intro"><div class="intro-title">下一段：'+esc(section)+'</div><div class="intro-card"><div class="d">'+esc(msg)+'</div></div><button class="btn bnext start-cta" id="sectionBtn" style="width:100%;margin-top:.85rem">繼續作答</button></div>';
  document.getElementById('sectionBtn').onclick=function(){pendingSectionIntro='';render();};
}

function renderQ(){
  const q=QS[qi];
  const pct=Math.round((qi/QS.length)*100);
  const isLast=qi===QS.length-1;
  const isSecondSection=section==='關於你喜歡的男生';
  const isMulti=q.type==='multi'||isSecondSection;
  const val=ans[q.id]||(isMulti?[]:'');
  const hasAns=isMulti?Array.isArray(val)&&val.length>0:String(val).trim()!=='';
  const section=q.section||'關於我';

  let body='';
  if(q.type==='number'){
    body='<input class="tinp" type="number" inputmode="numeric" id="inp" min="18" max="60" value="'+esc(val)+'" placeholder="例：26"/>';
  }else if(q.type==='text'){
    body='<input class="tinp" type="text" id="inp" maxlength="20" value="'+esc(val)+'" placeholder="輸入你的暱稱"/>';
  }else{
    body=(isSecondSection?'<span class="multi-hint">✓ 可複選多個，選你能接受的都選上</span>':
          isMulti?'<span class="multi-hint">請選擇最多 '+(q.maxSelect||1)+' 個</span>':'')+
      '<div class="opts">'+(q.opts||[]).map(function(o,i){
        const sel=isMulti?val.indexOf(o)!==-1:val===o;
        return '<button class="opt'+(sel?' sel':'')+(isMulti?' multi':'')+'" data-i="'+i+'" type="button"><span class="rdot"></span><span>'+esc(o)+'</span></button>';
      }).join('')+'</div>';
  }

  app.innerHTML=
    '<div class="prog"><div class="prog-meta"><span>第 '+(qi+1)+' 題 / 共 '+QS.length+' 題</span><span>'+(q.scorable?'⭐ 計分':'🌸 基本資料')+'</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>'+
    '<div class="qcard"><div class="qsec">✦ '+esc(section)+'</div><span class="qnum">Q'+String(qi+1).padStart(2,'0')+'</span><div class="qtxt">'+esc(q.label)+'</div>'+body+'</div>'+
    '<div class="nav">'+(qi>0?'<button class="btn bprev" id="btnPrev">← 上一題</button>':'<div></div>')+
    '<button class="btn bnext" id="btnNext" '+(hasAns?'':'disabled')+'>'+(isLast?'查看結果':'下一題 →')+'</button></div>';

  const btnPrev=document.getElementById('btnPrev'),btnNext=document.getElementById('btnNext');
  if(btnPrev)btnPrev.onclick=prev;
  btnNext.onclick=next;

  if(q.type==='single'||q.type==='multi'){
    app.querySelectorAll('.opt').forEach(function(btn){
      btn.onclick=function(){
        const idx=Number(btn.getAttribute('data-i'));
        if(q.type==='multi'){
          if(!Array.isArray(ans[q.id]))ans[q.id]=[];
          const sel=ans[q.id],item=q.opts[idx],pos=sel.indexOf(item);
          if(pos>=0)sel.splice(pos,1);
          else{
            // 第二部分不限制上限，第一部分才限制 maxSelect
            if(!isSecondSection&&sel.length>=(q.maxSelect||1))sel.shift();
            sel.push(item);
          }
          app.querySelectorAll('.opt').forEach(function(el,j){el.classList.toggle('sel',sel.indexOf(q.opts[j])!==-1);});
          btnNext.disabled=sel.length===0;
        }else{
          ans[q.id]=q.opts[idx];
          app.querySelectorAll('.opt').forEach(function(el,j){el.classList.toggle('sel',j===idx);});
          btnNext.disabled=false;
        }
      };
    });
  }else{
    const inp=document.getElementById('inp');
    inp.addEventListener('input',function(e){ans[q.id]=e.target.value.trim();btnNext.disabled=!String(ans[q.id]).trim();});
    setTimeout(function(){inp.focus();},60);
  }
}

function prev(){if(qi<=0)return;qi-=1;render();}

function next(){
  const q=QS[qi],v=ans[q.id];
  if(q.type==='multi'){if(!Array.isArray(v)||v.length===0)return;}
  else{if(v===undefined||String(v).trim()==='')return;}
  if(q.type==='number'){
    const age=parseInt(v,10);
    if(!Number.isFinite(age)||age<18||age>60){alert('請輸入 18~60 的年齡');return;}
    ans[q.id]=String(age);
  }
  if(qi<QS.length-1){
    qi+=1;
    const prevSec=(QS[qi-1]&&QS[qi-1].section)||'',nextSec=(QS[qi]&&QS[qi].section)||'';
    if(prevSec&&nextSec&&prevSec!==nextSec)pendingSectionIntro=nextSec;
    render();return;
  }
  calcResult();
}

function ageInRange(age,min,max){return Number.isFinite(age)&&age>=min&&age<=max;}

function calcResult(){
  const age=parseInt(ans['我的年齡'],10);
  const passList=GUYS.filter(function(guy){
    if(!ageInRange(age,Number(guy.ageMin),Number(guy.ageMax)))return false;
    const keys=Object.keys(guy.answers||{});
    for(let i=0;i<keys.length;i++){
      const k=keys[i];
      const userAns=ans[k];
      if(userAns===undefined||String(userAns).trim()==='')return false;
      const acceptable=(guy.answers[k]||[]).map(normalize);
      // 統一轉陣列
      let arr;
      if(Array.isArray(userAns))arr=userAns;
      else if(typeof userAns==='string'&&userAns.indexOf(',')!==-1)arr=userAns.split(',').map(function(s){return s.trim();}).filter(Boolean);
      else arr=null;
      if(arr){
        if(!arr.length)return false;
        // 不管哪個部分：只要有任意一個符合就 OK
        const anyHit=arr.some(function(u){return acceptable.indexOf(normalize(u))!==-1;});
        if(!anyHit)return false;
      }else{
        // 單選：直接比對
        if(acceptable.indexOf(normalize(userAns))===-1)return false;
      }
    }
    return true;
  });

  winner=null;
  for(let i=0;i<PRIORITY.length;i++){
    const hit=passList.find(function(p){return p.name===PRIORITY[i];});
    if(hit){winner=hit;break;}
  }
  if(!winner&&passList.length)winner=passList[0];
  done=true;renderResult();saveSheets(winner);
}

function renderResult(){
  if(winner){
    app.innerHTML='<div class="rcard"><div class="rbadge">✦ 你的緣分對象 ✦</div><div class="rlabel">你最適合的對象是</div><div class="rname">'+esc(winner.emoji||'💕')+' '+esc(winner.name)+'</div><div class="rprivate">🐧 想知道更多？請私訊企鵝哥哥</div></div><button class="brst" onclick="restart()">再測一次</button><div class="saving" id="sm"></div>';
  }else{
    app.innerHTML='<div class="nmcard"><h2>目前沒有符合的對象</h2><p>先別灰心，緣分正在路上 💕</p></div><button class="brst" onclick="restart()">再測一次</button><div class="saving" id="sm"></div>';
  }
}

function restart(){
  qi=0;done=false;winner=null;started=false;pendingSectionIntro='';
  Object.keys(ans).forEach(function(k){delete ans[k];});
  window.scrollTo(0,0);render();
}

function saveSheets(win){
  const payload=JSON.stringify({timestamp:new Date().toISOString(),answers:Object.assign({},ans),questions:QS,recommended:win?win.name:'無'});
  const sm=document.getElementById('sm');
  const ok=function(){if(sm){sm.textContent='✓ 已儲存';sm.className='saving ok';}};
  const err=function(){if(sm){sm.textContent='⚠ 儲存失敗';sm.className='saving err';}};
  if(navigator.sendBeacon){const s=navigator.sendBeacon(SCRIPT_URL,new Blob([payload],{type:'text/plain'}));s?ok():err();return;}
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload}).then(ok).catch(err);
}

boot();
</script>
</body>
</html>
